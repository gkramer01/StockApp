services:

  stockapp.api:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: stockapp.api

    ports:
      - "8080:8080"

    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Default: Host=stockapp.db;Port=5432;Database=stockapp;Username=postgres;Password=postgres

    depends_on:
      - stockapp.db

  stockapp.db:
    image: postgres:17

    container_name: stockapp.db

    environment:
      POSTGRES_DB: stockapp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: